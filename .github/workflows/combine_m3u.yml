name: Combine M3U v2 (No Deduplication)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1,16 * *"

permissions:
  contents: write   # required to push commits

jobs:
  combine:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip requests

      - name: 🔁 Combine M3U playlists
        run: python combine_m3u.py

      - name: 💾 Commit & push result
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add combinedv2.m3u
          git commit -m "Auto-update combined playlist (no deduplication)" || echo "No changes"
          git push
